<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Diri</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: left;
            min-width: 300px;
        }
        h2 {
            text-align: center;
            color: #1f2937;
            margin-bottom: 30px;
            margin-top: 0;
        }
        .info-group {
            margin-bottom: 15px;
            font-size: 16px;
        }
        .label {
            font-weight: 600;
            color: #4b5563;
            display: inline-block;
            width: 130px;
        }
        .value {
            color: #111827;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Biodata Mahasiswa</h2>
        
        <div class="info-group">
            <span class="label">Nama</span>
            <span class="value">: Dzaky Idzaa Syikta</span>
        </div>
        
        <div class="info-group">
            <span class="label">NIM</span>
            <span class="value">: 24.12.3210</span>
        </div>
        
        <div class="info-group">
            <span class="label">Program Studi</span>
            <span class="value">: Sistem Informasi</span>
        </div>

        <div class="info-group">
            <span class="label">Kampus</span>
            <span class="value">: Universitas AMIKOM Yogyakarta</span>
        </div>
    </div>

</body>
</html>
